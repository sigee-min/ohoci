name: Build Image

on:
  workflow_call:
    outputs:
      image_reference:
        description: Immutable image reference for the OhoCI runtime image.
        value: ${{ jobs.build.outputs.image_reference }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_reference: ${{ steps.collect.outputs.image_reference }}
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: sigee-min/ohoci
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Require main branch for image publication
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release image publication requires refs/heads/main; got ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Resolve image reference
        id: tags
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:12}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR with GHCR_TOKEN
        if: ${{ env.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Log in to GHCR with GITHUB_TOKEN fallback
        if: ${{ env.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Materialize root .dockerignore from deploy
        run: cp deploy/.dockerignore .dockerignore

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/sigee-min/ohoci:sha-${{ steps.tags.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Collect image reference
        id: collect
        run: |
          set -euo pipefail
          echo "image_reference=ghcr.io/sigee-min/ohoci@${{ steps.build.outputs.digest }}" >> "${GITHUB_OUTPUT}"

      - name: Clean temporary root .dockerignore
        if: ${{ always() }}
        run: rm -f .dockerignore
